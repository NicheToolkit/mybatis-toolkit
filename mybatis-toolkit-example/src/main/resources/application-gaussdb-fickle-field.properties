# service configuration
nichetoolkit.rice.service.delete-mode=delete
nichetoolkit.rice.service.delete.logic-mode=auto
nichetoolkit.rice.service.delete.config-mark=number
nichetoolkit.rice.service.delete.auto-mark=identity
nichetoolkit.rice.service.delete.accurate-judge=false
nichetoolkit.rice.service.dynamic-table=false

# postgresql table configuration
nichetoolkit.mybatis.table.catalog=
nichetoolkit.mybatis.table.schema=
nichetoolkit.mybatis.table.use-logic=false
nichetoolkit.mybatis.table.use-operate=false
nichetoolkit.mybatis.table.update-logic=false
nichetoolkit.mybatis.table.exclude-unused=true
nichetoolkit.mybatis.table.sql-script-show=true
nichetoolkit.mybatis.table.mysql-ignore-insert=false
nichetoolkit.mybatis.table.datetime-now=now()
nichetoolkit.mybatis.table.database-type=postgresql
nichetoolkit.mybatis.table.style-type=lower_underline
nichetoolkit.mybatis.table.excluded-type=excluded
nichetoolkit.mybatis.table.excludes=
nichetoolkit.mybatis.table.ignores=

# postgresql datasource configuration
spring.datasource.hikari.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.jdbc-url=jdbc:postgresql://localhost:5432/dynamic_db?stringtype=unspecified
spring.datasource.hikari.username=postgres
spring.datasource.hikari.password=2314